services:
  mongo:
    image: mongo:7
    container_name: coding-night-final
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: umerroot
      MONGO_INITDB_ROOT_PASSWORD: umer123

  mongo-express:
      image: mongo-express:1.0
      container_name: smit-final
      restart: unless-stopped
      ports:
        - "8082:8081"
      environment:
        ME_CONFIG_MONGODB_ADMINUSERNAME: umerroot
        ME_CONFIG_MONGODB_ADMINPASSWORD: umer123
        ME_CONFIG_MONGODB_SERVER: mongo
      depends_on:
        - mongo

volumes:
  mongo-data:
    
